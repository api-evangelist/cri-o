naftiko: 1.0.0-alpha2
info:
  label: CRI-O Status API — Containers
  description: 'CRI-O Status API — Containers. 1 operations. Lead operation: Get container info. Self-contained Naftiko capability
    covering one Cri O business surface.'
  tags:
  - Cri O
  - Containers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CRI_O_API_KEY: CRI_O_API_KEY
capability:
  consumes:
  - type: http
    namespace: status-containers
    baseUri: http://localhost
    description: CRI-O Status API — Containers business capability. Self-contained, no shared references.
    resources:
    - name: containers-id
      path: /containers/{id}
      operations:
      - name: getcontainer
        method: GET
        description: Get container info
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Container ID.
          required: true
  exposes:
  - type: rest
    namespace: status-containers-rest
    port: 8080
    description: REST adapter for CRI-O Status API — Containers. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/containers/{id}
      name: containers-id
      description: REST surface for containers-id.
      operations:
      - method: GET
        name: getcontainer
        description: Get container info
        call: status-containers.getcontainer
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: status-containers-mcp
    port: 9090
    transport: http
    description: MCP adapter for CRI-O Status API — Containers. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-container-info
      description: Get container info
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: status-containers.getcontainer
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.

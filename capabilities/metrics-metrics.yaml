naftiko: 1.0.0-alpha2
info:
  label: CRI-O Metrics API — Metrics
  description: 'CRI-O Metrics API — Metrics. 1 operations. Lead operation: Scrape Prometheus metrics. Self-contained Naftiko
    capability covering one Cri O business surface.'
  tags:
  - Cri O
  - Metrics
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CRI_O_API_KEY: CRI_O_API_KEY
capability:
  consumes:
  - type: http
    namespace: metrics-metrics
    baseUri: http://localhost:9090
    description: CRI-O Metrics API — Metrics business capability. Self-contained, no shared references.
    resources:
    - name: metrics
      path: /metrics
      operations:
      - name: getmetrics
        method: GET
        description: Scrape Prometheus metrics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: metrics-metrics-rest
    port: 8080
    description: REST adapter for CRI-O Metrics API — Metrics. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/metrics
      name: metrics
      description: REST surface for metrics.
      operations:
      - method: GET
        name: getmetrics
        description: Scrape Prometheus metrics
        call: metrics-metrics.getmetrics
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: metrics-metrics-mcp
    port: 9090
    transport: http
    description: MCP adapter for CRI-O Metrics API — Metrics. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: scrape-prometheus-metrics
      description: Scrape Prometheus metrics
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: metrics-metrics.getmetrics
      outputParameters:
      - type: object
        mapping: $.

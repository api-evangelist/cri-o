specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: CRI-O
providerId: cri-o
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Apache 2.0
  - CNCF
  - Cloud Native
  - Container Runtime
  - Containers
  - CRI
  - Go
  - Graduated
  - Kubernetes
  - OCI
  - Open Source
description: CRI-O is an open-source CNCF Graduated lightweight container runtime for Kubernetes, released
  under the Apache 2.0 license. There is no commercial offering or paid plan from the upstream CRI-O
  project. The runtime is free to use; commercial support is available indirectly through Kubernetes
  distributions that bundle CRI-O (notably Red Hat OpenShift) but no CRI-O-branded paid plan exists.
sources:
  - https://cri-o.io/
  - https://github.com/cri-o/cri-o
  - https://www.cncf.io/projects/cri-o/
plans:
  - id: cri-o-open-source
    name: Open Source
    type: freemium
    description: Apache 2.0 licensed open-source CRI-O release. Free to use, modify, and distribute.
      No commercial pricing applies.
    entries:
      - label: Software license
        name: license
        type: flat
        metric: license
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Apache 2.0 license
      - name: CNCF Graduated project
      - name: Community support via GitHub
      - name: CRI-O CRI gRPC API
      - name: CRI-O Status API
      - name: CRI-O Metrics API
notes: CRI-O is an open-source CNCF Graduated project with no upstream commercial pricing. Its APIs
  (CRI gRPC, Status, Metrics) are local-host interfaces consumed by the kubelet and operators, not
  metered hosted services. Reconciled is false because there is no provider-published pricing to reconcile
  against.
maintainers:

aid: cri-o
name: CRI-O
kind: opensource
description: >-
  CRI-O is a CNCF graduated, lightweight container runtime built specifically for Kubernetes. It implements the
  Kubernetes Container Runtime Interface (CRI) gRPC API and uses any Open Container Initiative (OCI) compatible runtime,
  including runc and crun, as the underlying container executor. CRI-O integrates with the containers/image and
  containers/storage libraries, the conmon container monitor, and CNI plugins to deliver a minimal kubelet-facing
  runtime surface, while also exposing an HTTP status API and Prometheus metrics endpoint for operations and
  observability.
url: https://raw.githubusercontent.com/api-evangelist/cri-o/refs/heads/main/apis.yml
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
